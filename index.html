<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

        <!-- Title & description -->
        <title>Midwestern Design System</title>
        <meta name="description" content="A React component library built on Untitled UI, styled to the Midwestern brand. Browse 23 components, brand tokens, and design guidelines." />
        <meta name="theme-color" content="#010313" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Midwestern Design System" />
        <meta property="og:description" content="A React component library built on Untitled UI, styled to the Midwestern brand. 23 components, brand tokens, and design guidelines." />
        <meta property="og:image" content="/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:url" content="https://mw-react-design-system.vercel.app" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Midwestern Design System" />
        <meta name="twitter:description" content="A React component library built on Untitled UI, styled to the Midwestern brand." />
        <meta name="twitter:image" content="/og-image.png" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            // Apply theme before render to avoid FOUC
            if (localStorage.theme === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark-mode");
            } else {
                document.documentElement.classList.remove("dark-mode");
            }
        </script>
    </body>
</html>
